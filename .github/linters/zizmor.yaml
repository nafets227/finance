# Config for zizmor Linter inside SuperLinter
rules:
  unpinned-uses:
    ignore:
      - docker-ci.yaml
      - docker-publish.yaml
  unpinned-images:
    ignore:
      - docker-ci.yaml
  dependabot-cooldown:
    ignore:
      - dependabot.yaml
  secrets-outside-env:
    ignore:
      - docker-ci.yaml
